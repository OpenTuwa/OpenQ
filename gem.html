<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Clone - Pro Edition</title>
    
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <style>
        :root {
            --bg-color: #131314; --nav-sidebar: #1e1f20; --text-main: #e3e3e3;
            --text-sub: #b4b4b4; --input-bg: #1e1f20; --user-msg-bg: #37393b;
            --font-family: 'Google Sans', Roboto, Arial, sans-serif;
        }

        body { background-color: var(--bg-color); color: var(--text-main); font-family: var(--font-family); height: 100vh; margin: 0; display: flex; overflow: hidden; }

        /* --- Sidebar --- */
        #sidebar { width: 280px; background-color: var(--nav-sidebar); display: flex; flex-direction: column; padding: 20px 12px; transition: transform 0.3s ease; border-right: 1px solid #333; }
        .new-chat-btn { background-color: #1a1a1c; color: var(--text-main); border: 1px solid #444746; border-radius: 20px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; font-size: 14px; font-weight: 500; margin-bottom: 24px; transition: background 0.2s; }
        .new-chat-btn:hover { background-color: #333537; }
        .chat-history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        .chat-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 12px; }
        .chat-item:hover { background-color: rgba(255,255,255,0.05); }
        .chat-item.active { background-color: #3f4145; }

        /* --- Main Layout --- */
        #main-container { flex: 1; display: flex; flex-direction: column; position: relative; height: 100%; }
        header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 1.2rem; color: var(--text-sub); }

        /* --- Chat Window --- */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px 0 180px 0; scroll-behavior: smooth; }
        .content-wrapper { max-width: 820px; margin: 0 auto; padding: 0 20px; }
        .message { margin-bottom: 32px; display: flex; gap: 20px; animation: fadeIn 0.3s ease-out; }
        .user-message { flex-direction: row-reverse; }

        .avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .ai-avatar { background: linear-gradient(135deg, #4285f4, #9b72cb, #d96570); background-size: 200% 200%; }
        .user-avatar { background: #5c5c5c; }

        /* Markdown Styles */
        .text-content { line-height: 1.6; font-size: 16px; word-wrap: break-word; max-width: 85%; width: 100%; }
        .text-content p { margin-bottom: 12px; }
        .text-content pre { background: #1e1f20; padding: 16px; border-radius: 12px; overflow-x: auto; border: 1px solid #333; margin: 12px 0; }
        .text-content code { font-family: monospace; font-size: 14px; }
        .text-content table { width: 100%; border-collapse: collapse; margin: 16px 0; }
        .text-content th, .text-content td { border: 1px solid #444746; padding: 8px 12px; text-align: left; }
        .user-message .text-content { background-color: var(--user-msg-bg); padding: 12px 20px; border-radius: 18px; width: auto; max-width: 85%; }

        /* --- Input Area --- */
        .input-area-fixed { position: absolute; bottom: 0; left: 0; right: 0; padding-bottom: 24px; background: linear-gradient(transparent, var(--bg-color) 30%); }
        .input-container { max-width: 820px; margin: 0 auto; background: var(--input-bg); border-radius: 32px; padding: 8px 12px 8px 24px; display: flex; align-items: flex-end; transition: box-shadow 0.2s; border: 1px solid #333; }
        .input-container:focus-within { background: #282a2c; }
        textarea { flex: 1; background: transparent !important; border: none !important; color: white !important; padding: 12px 0 !important; resize: none; outline: none; max-height: 200px; font-size: 16px; line-height: 1.5; }

        .input-actions { display: flex; gap: 8px; padding-bottom: 4px; }
        .icon-btn { background: transparent; border: none; color: var(--text-sub); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .icon-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .send-btn { color: #8ab4f8; }

        /* --- UI Chips & Animations --- */
        .tool-chip { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: #8ab4f8; background: rgba(138, 180, 248, 0.1); padding: 6px 12px; border-radius: 16px; margin-bottom: 12px; }
        .shimmer-text { display: none; flex-direction: column; gap: 12px; width: 100%; margin-top: 10px;}
        .shimmer-line { height: 16px; background: linear-gradient(90deg, #1e1f20 25%, #37393b 50%, #1e1f20 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite linear; border-radius: 4px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #37393b; border-radius: 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <button class="new-chat-btn" onclick="createNewChat()">
        <span class="material-symbols-outlined">add</span> New chat
    </button>
    <div style="font-size: 12px; font-weight: 500; color: var(--text-sub); margin-bottom: 8px; padding-left: 12px;">Recent</div>
    <div class="chat-history-list" id="sidebar-history"></div>
</div>

<div id="main-container">
    <header>
        <div>Gemini <span style="font-size: 12px; background: #37393b; padding: 2px 6px; border-radius: 4px; margin-left: 8px;">Pro</span></div>
    </header>

    <div id="chat-window">
        <div class="content-wrapper" id="history">
            <div id="welcome-msg" style="margin-top: 15vh;">
                <h1 style="font-size: 3rem; font-weight: 500; background: linear-gradient(to right, #4285f4, #d96570); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px;">Hello</h1>
                <h2 style="color: #444746; font-size: 3rem; font-weight: 500;">How can I help you today?</h2>
            </div>
        </div>
    </div>

    <div class="input-area-fixed">
        <div class="content-wrapper">
            <div class="input-container">
                <textarea id="userInput" rows="1" placeholder="Enter a prompt here" oninput="autoGrow(this)"></textarea>
                <div class="input-actions">
                    <button id="runBtn" class="icon-btn send-btn"><span class="material-symbols-outlined">send</span></button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- Configuration & Initialization ---
    marked.setOptions({
        highlight: function(code, lang) {
            const language = highlight.getLanguage(lang) ? lang : 'plaintext';
            return highlight.highlight(code, { language }).value;
        }
    });

    const runBtn = document.getElementById('runBtn');
    const historyDiv = document.getElementById('history');
    const userInput = document.getElementById('userInput');
    const welcomeMsg = document.getElementById('welcome-msg');
    const sidebarHistory = document.getElementById('sidebar-history');

    let chats = JSON.parse(localStorage.getItem('geminiChats')) || [];
    let currentChatId = null;
    let currentConversationContext = [];
    let isGenerating = false; // Track if the AI is currently typing

    function autoGrow(element) {
        element.style.height = "5px";
        element.style.height = (element.scrollHeight) + "px";
    }

    // --- State Management ---
    function getSystemPrompt() {
        return { 
            role: "system", 
            content: `You are Gemini. Current Date: ${new Date().toLocaleString()}. Provide clear, well-formatted Markdown responses. If the user asks for real-time data, rely on the injected CONTEXT provided in the prompt.` 
        };
    }

    function saveState() {
        localStorage.setItem('geminiChats', JSON.stringify(chats));
        renderSidebar();
    }

    function renderSidebar() {
        sidebarHistory.innerHTML = '';
        chats.forEach(chat => {
            const div = document.createElement('div');
            div.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
            div.innerHTML = `<span class="material-symbols-outlined" style="font-size: 16px;">chat_bubble</span> ${chat.title}`;
            div.onclick = () => loadChat(chat.id);
            sidebarHistory.appendChild(div);
        });
    }

    function createNewChat() {
        currentChatId = Date.now().toString();
        currentConversationContext = [getSystemPrompt()];
        chats.unshift({ id: currentChatId, title: "New Chat", messages: [] });
        saveState();
        refreshUI();
    }

    function loadChat(id) {
        if (isGenerating) return; // Prevent switching chats while generating
        currentChatId = id;
        const chat = chats.find(c => c.id === id);
        currentConversationContext = [getSystemPrompt(), ...chat.messages];
        refreshUI();
    }

    function refreshUI() {
        renderSidebar();
        const chat = chats.find(c => c.id === currentChatId);
        
        if (chat && chat.messages.length > 0) {
            welcomeMsg.style.display = 'none';
            historyDiv.innerHTML = ''; 
            
            chat.messages.forEach(msg => {
                if (msg.role === 'user') appendUserMessage(msg.content);
                else if (msg.role === 'assistant') appendAIMessage(msg.content);
            });
        } else {
            historyDiv.innerHTML = '';
            historyDiv.appendChild(welcomeMsg);
            welcomeMsg.style.display = 'block';
        }
        window.scrollTo(0, document.body.scrollHeight);
    }

    // --- UI Renderers ---
    function appendUserMessage(text) {
        // Strip out the injected live context if it exists so the user doesn't see it in history
        const displayText = text.replace(/\[LIVE WEB SEARCH CONTEXT:.*?\]\n\nUser Query: /g, '');
        historyDiv.innerHTML += `
            <div class="message user-message">
                <div class="avatar user-avatar"><span class="material-symbols-outlined" style="font-size: 20px;">person</span></div>
                <div class="text-content">${displayText}</div>
            </div>`;
    }

    function appendAIMessage(markdownText) {
        const htmlContent = marked.parse(markdownText);
        historyDiv.innerHTML += `
            <div class="message">
                <div class="avatar ai-avatar"><span class="material-symbols-outlined" style="color:white; font-size:18px;">auto_awesome</span></div>
                <div class="text-content">${htmlContent}</div>
            </div>`;
    }

    // --- The "Live Data" Tool Simulation ---
    async function fetchLiveContext(query) {
        try {
            const searchTerms = query.split(' ').slice(0, 3).join(' '); 
            const res = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(searchTerms)}&utf8=&format=json&origin=*`);
            const data = await res.json();
            
            if (data.query.search.length > 0) {
                const snippet = data.query.search[0].snippet.replace(/<[^>]*>?/gm, '');
                return `[LIVE WEB SEARCH CONTEXT: ${snippet}]`;
            }
        } catch (e) {
            console.log("Search failed", e);
        }
        return "";
    }

    // --- Main Execution (Streaming & Stop Button) ---
    async function execute() {
        const query = userInput.value.trim();
        
        // If it's already generating, this click acts as a STOP button
        if (isGenerating) {
            isGenerating = false; 
            return;
        }

        if (!query) return;

        if (!currentChatId) createNewChat();
        if (welcomeMsg) welcomeMsg.style.display = 'none';

        const chatIndex = chats.findIndex(c => c.id === currentChatId);
        if (chats[chatIndex].messages.length === 0) {
            chats[chatIndex].title = query.substring(0, 25) + '...';
        }

        // 1. Display User Message
        appendUserMessage(query);
        userInput.value = ''; userInput.style.height = 'auto';

        // 2. Change to STOP button & set state
        isGenerating = true;
        runBtn.innerHTML = '<span class="material-symbols-outlined">stop_circle</span>';
        runBtn.classList.remove('send-btn');

        // 3. Create an empty container for the AI's streaming message and search chip
        const msgContainerId = 'msg-' + Date.now();
        const searchChipId = 'search-' + Date.now();
        historyDiv.innerHTML += `
            <div class="message" id="wrapper-${msgContainerId}">
                <div class="avatar ai-avatar"><span class="material-symbols-outlined" style="color:white; font-size:18px;">auto_awesome</span></div>
                <div style="width: 100%;">
                    <div id="${searchChipId}" class="tool-chip"><span class="material-symbols-outlined" style="font-size: 14px;">travel_explore</span> Searching knowledge base...</div>
                    <div class="text-content" id="${msgContainerId}">
                        <div class="shimmer-text" style="display: flex;">
                            <div class="shimmer-line" style="width: 100%;"></div>
                            <div class="shimmer-line" style="width: 80%;"></div>
                        </div>
                    </div>
                </div>
            </div>`;
        window.scrollTo(0, document.body.scrollHeight);

        const textContainer = document.getElementById(msgContainerId);
        const searchChip = document.getElementById(searchChipId);
        let accumulatedText = "";

        // Fetch Live Data before asking the AI
        const liveData = await fetchLiveContext(query);
        const enrichedQuery = liveData ? `${liveData}\n\nUser Query: ${query}` : query;
        searchChip.style.display = 'none'; // Hide search chip once data is fetched

        // Save User context
        currentConversationContext.push({ role: "user", content: enrichedQuery });
        chats[chatIndex].messages.push({ role: "user", content: enrichedQuery });
        saveState();

        try {
            // 4. Request a STREAMING response from Puter
            const response = await puter.ai.chat(currentConversationContext, { 
                model: 'gemini-3-pro-preview',
                stream: true 
            });

            // 5. Read the stream token by token
            for await (const chunk of response) {
                if (!isGenerating) break; // If user clicked Stop, break the loop

                // Clear the loading shimmer on the very first token
                if (accumulatedText === "") {
                    textContainer.innerHTML = "";
                }

                // Append new chunk
                let chunkText = typeof chunk === 'string' ? chunk : (chunk?.text || '');
                accumulatedText += chunkText;
                
                // Parse the markdown LIVE
                textContainer.innerHTML = marked.parse(accumulatedText);
                
                // Keep auto-scrolling
                window.scrollTo(0, document.body.scrollHeight);
            }

            // 6. Save final message to history
            currentConversationContext.push({ role: "assistant", content: accumulatedText });
            chats[chatIndex].messages.push({ role: "assistant", content: accumulatedText });
            saveState();

        } catch (error) {
            textContainer.innerHTML = "<span style='color: #ff6b6b;'>Connection interrupted. Please try again.</span>";
            console.error(error);
        } finally {
            // 7. Reset the button back to Send
            isGenerating = false;
            runBtn.innerHTML = '<span class="material-symbols-outlined">send</span>';
            runBtn.classList.add('send-btn');
        }
    }

    // --- Listeners & Startup ---
    runBtn.onclick = execute;
    userInput.addEventListener("keypress", (e) => { 
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); execute(); } 
    });

    if (chats.length > 0) loadChat(chats[0].id);
    else createNewChat();

</script>
</body>
</html>
